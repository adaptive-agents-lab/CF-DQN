program: cleanrl/cf_dqn.py
method: grid
metric:
  name: charts/episodic_return
  goal: maximize
  summary: mean
parameters:
  seed:
    values: [1, 2, 3]
  n_frequencies:
    values: [128, 256, 512]
  freq_max:
    values: [1.0, 2.0, 4.0, 8.0, 20]
  penalty_weight:
    values: [0.0, 1.0, 5.0, 10.0]
  env_id:
    value: "CartPole-v1"
  total_timesteps:
    value: 100000
  learning_rate:
    value: 2.5e-4
  gamma:
    value: 0.99
  batch_size:
    value: 128
  buffer_size:
    value: 10000
  learning_starts:
    value: 10000
  train_frequency:
    value: 10
  target_network_frequency:
    value: 500

command:
  - ${env}
  - python
  - ${program}
  - --track
  - ${args}